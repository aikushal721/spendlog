<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spendlog</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spendlog">
<meta name="theme-color" content="#1db885">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#18181c;--surface2:#22222a;--border:#2e2e38;
  --text:#f0f0f2;--muted:#7a7a8c;--accent:#1db885;--accent-dim:#0e5c42;
  --amber:#f0a500;--coral:#e55b50;--blue:#4a8cff;--purple:#a78bfa;
  --radius:10px;--font-num:'DM Mono',monospace;--font:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:var(--font);outline:none}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
@media(max-width:768px){.app{grid-template-columns:1fr}}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto}
@media(max-width:768px){.sidebar{position:fixed;bottom:0;left:0;right:0;height:60px;flex-direction:row;align-items:center;justify-content:space-around;padding:0;border-right:none;border-top:1px solid var(--border);z-index:100;height:58px}}
.logo{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-.5px;padding:0 8px;margin-bottom:24px}
@media(max-width:768px){.logo{display:none}}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-item svg{flex-shrink:0;width:18px;height:18px}
@media(max-width:768px){.nav-item{flex-direction:column;gap:2px;padding:6px 12px;font-size:10px;border-radius:0}}
.main{padding:32px;overflow-y:auto;max-height:100vh}
@media(max-width:768px){.main{padding:20px 16px 80px;max-height:none}}
.page{display:none}.page.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.stat-card .label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-card .value{font-family:var(--font-num);font-size:22px;font-weight:500}
.stat-card .sub{font-size:11px;color:var(--muted);margin-top:4px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:28px}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-title{font-size:15px;font-weight:600}
.chart-sub{font-size:12px;color:var(--muted);font-family:var(--font-num)}
.chart-wrap{position:relative;width:100%;height:180px}
.quick-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.quick-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:13px;color:var(--text);transition:all .15s;white-space:nowrap}
.quick-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:500px){.form-row{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:12px;font-weight:500;color:var(--muted)}
.form-group input,.form-group select,.form-group textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:14px;transition:border .15s;width:100%}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group select option{background:var(--surface2)}
.form-group textarea{resize:none;height:72px;font-family:var(--font)}
.btn-primary{background:var(--accent);color:#fff;padding:11px 24px;border-radius:8px;font-size:14px;font-weight:600;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 24px;border-radius:8px;font-size:14px;font-weight:500;transition:background .15s}
.btn-secondary:hover{background:var(--border)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}
.page-title{font-size:22px;font-weight:700;margin-bottom:24px;letter-spacing:-.3px}
.page-title small{font-size:13px;font-weight:400;color:var(--muted);font-family:var(--font-num);display:block;margin-top:2px}
.month-nav{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.month-nav .mnth{font-size:17px;font-weight:700;min-width:150px}
.month-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 12px;font-size:14px;font-weight:600;transition:background .15s}
.month-nav button:hover{background:var(--border)}
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:border .15s}
.tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-cat{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-note{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-right{text-align:right;flex-shrink:0}
.tx-amount{font-family:var(--font-num);font-size:15px;font-weight:500}
.tx-date{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--font-num)}
.tx-del{background:none;border:none;color:var(--muted);font-size:16px;padding:4px 6px;border-radius:6px;opacity:0;transition:opacity .15s}
.tx-item:hover .tx-del{opacity:1}
.tx-del:hover{color:var(--coral);background:rgba(229,91,80,.1)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-chip{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:5px 12px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.filter-chip.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.badge{font-size:10px;font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:2px 8px;color:var(--muted);margin-left:6px}
.badge.green{background:rgba(29,184,133,.15);border-color:var(--accent);color:var(--accent)}
.badge.red{background:rgba(229,91,80,.15);border-color:var(--coral);color:var(--coral)}
.badge.amber{background:rgba(240,165,0,.15);border-color:var(--amber);color:var(--amber)}
.cat-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.cat-pill{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:4px 12px 4px 10px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.cat-pill button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0}
.cat-pill button:hover{color:var(--coral)}
.cat-add-row{display:flex;gap:8px;margin-top:10px}
.cat-add-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 12px;font-size:13px}
.cat-add-row input:focus{border-color:var(--accent)}
.cat-add-row button{background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;color:var(--accent);padding:8px 14px;font-size:13px;font-weight:600}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .icon{font-size:36px;margin-bottom:10px}
.empty p{font-size:14px}
.rec-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:8px}
.rec-info{flex:1}
.rec-name{font-size:14px;font-weight:500}
.rec-meta{font-size:12px;color:var(--muted);margin-top:2px}
.rec-amount{font-family:var(--font-num);font-size:15px;font-weight:500;color:var(--amber);margin-right:8px}
.rec-del{background:none;border:none;color:var(--muted);font-size:16px;padding:4px 6px;border-radius:6px;cursor:pointer;transition:color .15s}
.rec-del:hover{color:var(--coral)}

/* Udhar specific */
.udhar-tabs{display:flex;gap:0;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px}
.udhar-tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);border-radius:7px;cursor:pointer;transition:all .15s}
.udhar-tab.active{background:var(--surface2);color:var(--text)}
.udhar-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px}
.udhar-card.overdue{border-color:rgba(229,91,80,.4)}
.udhar-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.udhar-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.udhar-name{font-size:15px;font-weight:600;flex:1}
.udhar-amt{font-family:var(--font-num);font-size:17px;font-weight:500}
.udhar-meta{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-bottom:12px;flex-wrap:wrap}
.udhar-progress{background:var(--surface2);border-radius:4px;height:5px;margin-bottom:12px;overflow:hidden}
.udhar-progress-bar{height:100%;border-radius:4px;transition:width .4s}
.udhar-actions{display:flex;gap:8px;flex-wrap:wrap}
.udhar-actions button{font-size:12px;padding:6px 12px;border-radius:7px;font-weight:600;transition:all .15s}
.btn-settle{background:rgba(29,184,133,.15);border:1px solid var(--accent);color:var(--accent)}
.btn-settle:hover{background:rgba(29,184,133,.3)}
.btn-partial{background:rgba(74,140,255,.15);border:1px solid var(--blue);color:var(--blue)}
.btn-partial:hover{background:rgba(74,140,255,.3)}
.btn-danger{background:rgba(229,91,80,.1);border:1px solid var(--coral);color:var(--coral)}
.btn-danger:hover{background:rgba(229,91,80,.2)}
.payments-log{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:6px}
.pay-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);font-family:var(--font-num)}
.pay-row span:first-child{color:var(--text)}
.udhar-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.usumm{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.usumm .label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.usumm .val{font-family:var(--font-num);font-size:20px;font-weight:500}

/* Sync */
.sync-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;border:1px solid var(--border);background:var(--surface)}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.green{background:var(--accent)}
.sync-dot.amber{background:var(--amber)}
.sync-dot.red{background:var(--coral)}
.sync-dot.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:769px){.toast{bottom:24px}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:360px;width:100%}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.info-box{background:rgba(74,140,255,.08);border:1px solid rgba(74,140,255,.25);border-radius:8px;padding:12px 14px;font-size:13px;color:#7ab4ff;line-height:1.7;margin-bottom:16px}
.info-box a{color:var(--blue);text-decoration:underline}
.step-badge{display:inline-block;background:var(--blue);color:#fff;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;text-align:center;line-height:20px;margin-right:6px}
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="logo">spendlog</div>
    <div class="nav-item active" onclick="showPage('dashboard',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </div>
    <div class="nav-item" onclick="showPage('add',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Add</span>
    </div>
    <div class="nav-item" onclick="showPage('transactions',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>History</span>
    </div>
    <div class="nav-item" onclick="showPage('udhar',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Udhar</span>
    </div>
    <div class="nav-item" onclick="showPage('recurring',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      <span>Recurring</span>
    </div>
    <div class="nav-item" onclick="showPage('settings',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </div>
  </nav>
  <main class="main">

    <!-- DASHBOARD -->
    <div id="page-dashboard" class="page active">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">&#8249;</button>
        <span class="mnth" id="month-display"></span>
        <button onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="label">Today</div><div class="value" style="color:var(--coral)" id="stat-today">₹0</div><div class="sub" id="stat-today-c">0 txns</div></div>
        <div class="stat-card"><div class="label">This week</div><div class="value" style="color:var(--amber)" id="stat-week">₹0</div><div class="sub" id="stat-week-c">0 txns</div></div>
        <div class="stat-card"><div class="label">This month</div><div class="value" style="color:var(--accent)" id="stat-month">₹0</div><div class="sub" id="stat-month-c">0 txns</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-header"><span class="chart-title">Daily spending</span><span class="chart-sub" id="chart-label">Last 30 days</span></div>
        <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="section-title">Recent transactions</div>
      <div id="recent-list" class="tx-list"></div>
    </div>

    <!-- ADD -->
    <div id="page-add" class="page">
      <div class="page-title">Add expense</div>
      <div class="section-title" style="margin-bottom:10px">Quick add</div>
      <div class="quick-grid" id="quick-grid"></div>
      <div class="form-card">
        <div class="form-row">
          <div class="form-group"><label>Amount (₹)</label><input type="number" id="inp-amount" placeholder="0.00" min="0" step="0.01"></div>
          <div class="form-group"><label>Category</label><select id="inp-category"></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Note (optional)</label><input type="text" id="inp-note" placeholder="What was this for?"></div>
          <div class="form-group"><label>Date</label><input type="date" id="inp-date"></div>
        </div>
        <div class="btn-row"><button class="btn-primary" onclick="addExpense()">Add expense</button><button class="btn-secondary" onclick="clearForm()">Clear</button></div>
      </div>
    </div>

    <!-- TRANSACTIONS -->
    <div id="page-transactions" class="page">
      <div class="page-title">All transactions<small id="tx-total-label"></small></div>
      <div class="filter-row" id="filter-row"></div>
      <div id="tx-list" class="tx-list"></div>
    </div>

    <!-- UDHAR -->
    <div id="page-udhar" class="page">
      <div class="page-title">Udhar</div>
      <div class="udhar-summary">
        <div class="usumm"><div class="label">Mujhe milna hai</div><div class="val" style="color:var(--accent)" id="u-total-lent">₹0</div></div>
        <div class="usumm"><div class="label">Mujhe dena hai</div><div class="val" style="color:var(--coral)" id="u-total-borrowed">₹0</div></div>
      </div>
      <div class="udhar-tabs">
        <div class="udhar-tab active" id="tab-lent" onclick="switchUdharTab('lent')">Maine diya 💸</div>
        <div class="udhar-tab" id="tab-borrowed" onclick="switchUdharTab('borrowed')">Maine liya 🤝</div>
        <div class="udhar-tab" id="tab-settled" onclick="switchUdharTab('settled')">Settled ✓</div>
      </div>
      <div id="udhar-list"></div>
      <button class="btn-primary" style="width:100%;margin-top:16px" onclick="openAddUdhar()">+ Add udhar entry</button>
    </div>

    <!-- RECU
